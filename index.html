<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Travelling Salesman Problem Solver</title>
		<link rel="stylesheet" href="target/styles.css" />
		<link rel="icon" href="favicon.png" type="image/png" />
		<script src="go-src/wasm_exec.js"></script>
	</head>

	<body class="min-h-[100vh] bg-violet-950 text-neutral-200 font-sans">
		<div class="backdrop"></div>
		<div class="bg-transparent px-6 py-4 mb-8 backdrop-blur-md rounded-b-lg shadow-xl text-lg font-bold">
			Travelling Salesman Problem Solver
		</div>

		<main
			class="grid grid-cols-1 2xl:grid-cols-[minmax(300px,600px)_806px_minmax(300px,600px)] justify-center gap-4 grid-gap-4 px-8 mx-auto">
			<div class="flex flex-col gap-4">
				<div id="tsp-container-aco" class="flex flex-col gap-2 p-4 backdrop-blur-md rounded-lg shadow-lg bg-white/15">
					<div id="parameter-container-aco">
						<label class="flex flex-col justify-start text-m text-neutral-300 accent-pink-600 font-bold">
							<span class="inline-flex flex-row items-center gap-2">
								<span>Ant Colony Optimization</span>
								<input id="aco-enabled" type="checkbox" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Iteration count
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-iteration-range" type="range" min="1" max="200" />
								<input id="aco-iteration-input" class="w-[80px]" type="number" min="1" max="200" step="1" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Ant count
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-ant-count-range" type="range" min="1" max="200" />
								<input id="aco-ant-count-input" class="w-[80px]" type="number" min="1" max="200" step="1" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Pheromone importance (α)
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-pheromone-range" type="range" min="0" max="10" step="0.1" />
								<input id="aco-pheromone-input" class="w-[80px]" type="number" min="0" max="10" step="0.1" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Distance priority (β)
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-distance-range" type="range" min="1" max="10" step="0.1" />
								<input id="aco-distance-input" class="w-[80px]" type="number" min="1" max="10" step="0.1" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Pheromone evaporation rate
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-evaporation-range" type="range" min="0" max="1" step="0.05" />
								<input id="aco-evaporation-input" class="w-[80px]" type="number" min="0" max="1" step="0.05" />
							</span>
						</label>

						<label class="flex flex-col justify-start text-sm text-neutral-300 accent-pink-600">
							Pheromone deposit rate
							<span class="inline-flex flex-row items-center gap-2">
								<input class="w-full" id="aco-deposit-range" type="range" min="10" max="1000" step="1" />
								<input id="aco-deposit-input" class="w-[80px]" type="number" min="10" max="1000" step="1" />
							</span>
						</label>
					</div>

					<div id="result-container-aco" class="flex flex-row gap-2">
						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Best distance</span>
							<p id="distance-label-aco" class="font-bold">
								<span>&nbsp;</span><small class="optimal-distance-label">&nbsp;</small>
							</p>
						</div>

						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Execution time</span>
							<p id="execution-time-label-aco" class="font-bold">&nbsp;</p>
						</div>
					</div>
				</div>

				<div id="tsp-container-bf" class="flex flex-col gap-2 p-4 backdrop-blur-md rounded-lg shadow-lg bg-white/15">
					<div id="parameter-container-bf">
						<label class="flex flex-col justify-start text-m text-neutral-300 accent-sky-600 font-bold">
							<span class="inline-flex flex-row items-center gap-2">
								<span>Brute Force</span>
								<input id="bf-enabled" type="checkbox" />
							</span>
						</label>

						<p class="text-sm">
							Algorithm only available for datasets up to <strong>14 nodes</strong> due to its time complexity.
						</p>
					</div>

					<div id="result-container-bf" class="flex flex-row gap-2">
						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Best distance</span>
							<p id="distance-label-bf" class="font-bold">
								<span>&nbsp;</span><small class="optimal-distance-label">&nbsp;</small>
							</p>
						</div>

						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Execution time</span>
							<p id="execution-time-label-bf" class="font-bold">&nbsp;</p>
						</div>
					</div>
				</div>
			</div>

			<div class="flex flex-col gap-4">
				<div class="flex flex-col p-4 gap-2 backdrop-blur-md rounded-lg shadow-lg bg-white/15 mx-auto">
					<div id="graph-container" class="p-[10px] rounded-sm border-2 border-neutral-200/20">
						<canvas id="graph-canvas" width="750" height="750"></canvas>
					</div>
				</div>

				<div class="flex flex-col p-4 gap-2 backdrop-blur-md rounded-lg shadow-lg bg-white/15 mx-auto">
					<label class="flex flex-col justify-start">
						<span class="text-sm text-neutral-300">Dataset</span>
						<select id="dataset-select"></select>
					</label>
					<label class="flex flex-row items-center gap-2 accent-pink-600 w-fit">
						Show labels
						<input id="labels-checkbox" type="checkbox" checked="true" />
					</label>

					<div class="mt-auto">
						<button
							id="run-button"
							type="button"
							class="rounded-full font-bold p-2 my-4 bg-linear-30 from-indigo-600/0 to-pink-600/70 border-2 border-white hover:shadow-md shadow-pink-600 disabled:shadow-none disabled:opacity-75 disabled:border-transparent w-full text-white flex align-items-center justify-center gap-2">
							<img src="/static/load-spinner-animated.svg" class="text-inherit inline-block" alt="Running..." />
							<span>Run</span>
						</button>

						<div
							id="distance-chart-container"
							class="p-[10px] mx-auto w-[750px] box-content rounded-sm border-2 border-neutral-200/20 my-2">
							<canvas id="distance-chart-canvas" width="750" height="180"></canvas>
						</div>
					</div>
				</div>
			</div>

			<div class="flex flex-col gap-4">
				<div id="tsp-container-nn" class="flex flex-col gap-2 p-4 backdrop-blur-md rounded-lg shadow-lg bg-white/15">
					<div id="parameter-container-nn">
						<label class="flex flex-col justify-start text-m text-neutral-300 accent-violet-600 font-bold">
							<span class="inline-flex flex-row items-center gap-2">
								<span>Nearest Neighbor</span>
								<input id="nn-enabled" type="checkbox" />
							</span>
						</label>
					</div>

					<div id="result-container-nn" class="flex flex-row gap-2">
						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Best distance</span>
							<p id="distance-label-nn" class="font-bold">
								<span>&nbsp;</span><small class="optimal-distance-label">&nbsp;</small>
							</p>
						</div>

						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Execution time</span>
							<p id="execution-time-label-nn" class="font-bold">&nbsp;</p>
						</div>
					</div>
				</div>

				<div id="tsp-container-sa" class="flex flex-col gap-2 p-4 backdrop-blur-md rounded-lg shadow-lg bg-white/15">
					<div id="parameter-container-sa">
						<label class="flex flex-col justify-start text-m text-neutral-300 accent-emerald-600 font-bold">
							<span class="inline-flex flex-row items-center gap-2">
								<span>Simulated Annealing</span>
								<input id="sa-enabled" type="checkbox" />
							</span>
						</label>
					</div>

					<div id="result-container-sa" class="flex flex-row gap-2">
						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Best distance</span>
							<p id="distance-label-sa" class="font-bold">
								<span>&nbsp;</span><small class="optimal-distance-label">&nbsp;</small>
							</p>
						</div>

						<div class="flex flex-col justify-start p-2 w-full rounded-md bg-white/15">
							<span class="text-sm text-neutral-300">Execution time</span>
							<p id="execution-time-label-sa" class="font-bold">&nbsp;</p>
						</div>
					</div>
				</div>
			</div>
		</main>

		<script src="target/index.js" type="module"></script>
	</body>
</html>
